version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: decideai_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=DecideAI

  ollama:
    image: ollama/ollama:latest
    container_name: decideai_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # We will need to pull the models via `docker exec -it decideai_ollama ollama pull phi3` 
    # or inside an init script.

  # Optional UI for MongoDB
  mongo-express:
    image: mongo-express
    container_name: decideai_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/
    depends_on:
      - mongodb

volumes:
  mongodb_data:
  ollama_data:
